<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>索引重建进度预览</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      color-scheme: dark;
      font-family: Inter, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      background: #090b0a;
      color: #e5e9e5;
    }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 75% 10%, rgba(187, 255, 102, .08), transparent 30rem),
        #090b0a;
    }
    main { width: min(720px, calc(100vw - 32px)); }
    .caption {
      margin: 0 0 14px;
      color: #8f9991;
      font-size: 12px;
      font-weight: 700;
    }
    .card {
      display: grid;
      gap: 10px;
      padding: 10px;
      border: 1px solid rgba(255, 255, 255, .1);
      border-radius: 8px;
      background: rgba(12, 14, 13, .82);
    }
    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 20px;
      font-size: 12px;
      font-weight: 900;
    }
    .status-row span { color: #b6bdb7; }
    .status-row strong { color: #6f8aff; }
    .progress-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .track {
      height: 8px;
      flex: 1;
      overflow: hidden;
      border-radius: 999px;
      background: #343a36;
    }
    .bar {
      display: block;
      width: 42%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #3158ff, #bbff66);
      box-shadow: 0 0 18px rgba(49, 88, 255, .28);
      transition: width 180ms ease;
    }
    .count {
      min-width: 58px;
      color: #7f8981;
      font-size: 10px;
      font-weight: 900;
      text-align: right;
    }
    .controls {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
      margin-top: 20px;
      padding: 14px;
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: 8px;
      background: rgba(255, 255, 255, .035);
    }
    input { width: 100%; accent-color: #bbff66; }
    output {
      min-width: 42px;
      color: #bbff66;
      font-size: 12px;
      font-weight: 900;
      text-align: right;
    }
  </style>
</head>
<body>
  <main>
    <p class="caption">Settings / 运行状态 / REBUILDING</p>
    <section class="card" aria-label="索引重建状态">
      <div class="status-row">
        <span>索引状态</span>
        <strong>重建中</strong>
      </div>
      <div class="progress-row">
        <div class="track" aria-hidden="true">
          <span class="bar" id="bar"></span>
        </div>
        <span class="count" id="count">420/1000</span>
      </div>
    </section>

    <label class="controls">
      <input id="progress" type="range" min="0" max="1000" value="420" />
      <output id="percent">42%</output>
    </label>
  </main>

  <script>
    const total = 1000;
    const input = document.querySelector("#progress");
    const bar = document.querySelector("#bar");
    const count = document.querySelector("#count");
    const percent = document.querySelector("#percent");

    function render() {
      const migrated = Number(input.value);
      const value = Math.round((migrated / total) * 100);
      bar.style.width = `${value}%`;
      count.textContent = `${migrated}/${total}`;
      percent.textContent = `${value}%`;
    }

    input.addEventListener("input", render);
    render();
  </script>
</body>
</html>
